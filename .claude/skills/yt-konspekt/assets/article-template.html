<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{META_DESCRIPTION}}">
<style>
  :root{
    --bg:#faf9f7;
    --surface:#ffffff;
    --surface-2:#f3f1ec;
    --text:#262420;
    --text-soft:#5c574f;
    --text-faint:#8a8378;
    --border:#e7e3db;
    --accent:#9a6a3c;        /* тёплый приглушённый терракот/охра */
    --accent-soft:#f0e7dc;
    --accent-ink:#7a5128;
    --ok:#3f7d52;
    --shadow:0 1px 2px rgba(40,33,22,.04), 0 6px 24px rgba(40,33,22,.05);
    --radius:14px;
    --maxread:720px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --serif:"Georgia","Times New Roman",serif;
  }
  html[data-theme="dark"]{
    --bg:#17150f;
    --surface:#201d16;
    --surface-2:#262219;
    --text:#ece7dd;
    --text-soft:#b9b2a4;
    --text-faint:#8b8473;
    --border:#332f25;
    --accent:#d3a36b;
    --accent-soft:#2c2519;
    --accent-ink:#e6c294;
    --ok:#7bbf8c;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    font-size:18px;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* progress bar */
  #progress{
    position:fixed;top:0;left:0;height:3px;width:0;
    background:linear-gradient(90deg,var(--accent),var(--accent-ink));
    z-index:60;transition:width .12s ease-out;
  }

  /* topbar */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:color-mix(in srgb,var(--bg) 86%,transparent);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .topbar-inner{
    max-width:1180px;margin:0 auto;padding:10px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--text)}
  .brand a{color:inherit;text-decoration:none}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .back{color:var(--text-soft);text-decoration:none;font-size:14px}
  .back:hover{color:var(--accent)}
  .theme-toggle{
    border:1px solid var(--border);background:var(--surface);color:var(--text-soft);
    width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:17px;
    display:inline-flex;align-items:center;justify-content:center;transition:.15s;
  }
  .theme-toggle:hover{color:var(--accent);border-color:var(--accent)}

  /* layout */
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px;
    display:grid;grid-template-columns:260px minmax(0,1fr);gap:48px;}
  aside{position:sticky;top:64px;align-self:start;height:calc(100vh - 80px);
    overflow-y:auto;padding:28px 4px 40px;}
  aside .toc-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--text-faint);margin:0 0 14px;font-weight:700;}
  .toc{list-style:none;margin:0;padding:0;border-left:2px solid var(--border)}
  .toc li{margin:0}
  .toc a{display:block;padding:6px 0 6px 16px;margin-left:-2px;
    border-left:2px solid transparent;color:var(--text-soft);
    text-decoration:none;font-size:14.5px;line-height:1.4;transition:.15s;}
  .toc a:hover{color:var(--accent)}
  .toc a.active{color:var(--accent-ink);border-left-color:var(--accent);font-weight:600}

  main{min-width:0;padding:8px 0 96px}
  article{max-width:var(--maxread)}

  /* hero */
  .hero{padding:40px 0 8px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    color:var(--accent-ink);background:var(--accent-soft);
    padding:5px 12px;border-radius:999px;margin-bottom:18px}
  h1{font-size:clamp(28px,5vw,42px);line-height:1.15;margin:.1em 0 .35em;
    letter-spacing:-.01em;font-weight:800}
  .lede{font-size:clamp(18px,2.4vw,21px);color:var(--text-soft);line-height:1.55;margin:0 0 24px}
  .meta-row{display:flex;flex-wrap:wrap;gap:8px 20px;align-items:center;
    padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    font-size:14.5px;color:var(--text-soft)}
  .meta-row b{color:var(--text)}
  .meta-row .sep{color:var(--border)}

  /* video embed + source */
  .video{margin:24px 0 8px;border-radius:var(--radius);overflow:hidden;
    border:1px solid var(--border);box-shadow:var(--shadow);background:#000}
  .video iframe{display:block;width:100%;aspect-ratio:16/9;border:0}
  .source-row{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;
    margin:14px 0 4px;font-size:14.5px}
  .source-row a.src-btn{display:inline-flex;align-items:center;gap:8px;
    text-decoration:none;color:var(--accent-ink);background:var(--accent-soft);
    border:1px solid color-mix(in srgb,var(--accent) 25%,var(--border));
    padding:7px 14px;border-radius:999px;font-weight:600;transition:.15s}
  .source-row a.src-btn:hover{border-color:var(--accent)}

  /* mobile toc */
  .toc-mobile{display:none;margin:24px 0 8px;border:1px solid var(--border);
    border-radius:12px;background:var(--surface);overflow:hidden}
  .toc-mobile summary{cursor:pointer;padding:14px 18px;font-weight:600;list-style:none;
    display:flex;align-items:center;justify-content:space-between}
  .toc-mobile summary::-webkit-details-marker{display:none}
  .toc-mobile summary::after{content:"▾";color:var(--text-faint);transition:.2s}
  .toc-mobile[open] summary::after{transform:rotate(180deg)}
  .toc-mobile ol{margin:0;padding:4px 18px 18px 36px;color:var(--text-soft)}
  .toc-mobile a{color:var(--text-soft);text-decoration:none}
  .toc-mobile a:hover{color:var(--accent)}

  /* typography */
  h2{font-size:clamp(23px,3.4vw,30px);line-height:1.25;margin:64px 0 4px;
    letter-spacing:-.01em;font-weight:750;scroll-margin-top:80px;position:relative}
  h2 .num{display:block;font-size:13px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  h3{font-size:21px;margin:38px 0 6px;font-weight:700;scroll-margin-top:80px}
  .anchor{color:var(--text-faint);text-decoration:none;opacity:0;margin-left:8px;
    font-weight:400;transition:.15s}
  h2:hover .anchor,h3:hover .anchor{opacity:1}
  p{margin:16px 0}
  article a{color:var(--accent-ink);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}
  strong{font-weight:700;color:var(--text)}
  hr.div{border:0;border-top:1px solid var(--border);margin:56px 0}

  ul,ol{padding-left:1.3em;margin:16px 0}
  li{margin:8px 0}
  ul.clean{list-style:none;padding-left:0}
  ul.clean li{position:relative;padding-left:30px}
  ul.clean li::before{content:"";position:absolute;left:4px;top:.62em;width:8px;height:8px;
    border-radius:50%;background:var(--accent)}
  ul.check li::before,ul.cross li::before{display:none}
  ul.check li,ul.cross li{position:relative;padding-left:32px;list-style:none}
  ul.check,ul.cross{padding-left:0}
  ul.check li::after{content:"✓";position:absolute;left:2px;top:0;color:var(--ok);font-weight:800}
  ul.cross li::after{content:"✕";position:absolute;left:2px;top:0;color:#c2694e;font-weight:800}

  /* callout */
  .callout{margin:30px 0;padding:22px 24px 22px 26px;border-radius:var(--radius);
    background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,var(--border));
    position:relative}
  .callout .k{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent-ink);margin-bottom:8px}
  .callout p{margin:0;font-size:19px;line-height:1.5;color:var(--text)}
  .callout p+p{margin-top:10px;font-size:16px;color:var(--text-soft)}

  .note{margin:26px 0;padding:18px 20px;border-left:3px solid var(--accent);
    background:var(--surface-2);border-radius:0 10px 10px 0;font-size:16.5px;color:var(--text-soft)}
  .note b{color:var(--text)}

  /* case cards */
  .cases{display:grid;gap:18px;margin:28px 0}
  .case{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);
    box-shadow:var(--shadow);padding:22px 24px}
  .case-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:8px}
  .case-name{font-weight:750;font-size:18px}
  .case-name span{display:block;font-weight:500;font-size:14px;color:var(--text-faint);margin-top:2px}
  .case-num{font-size:26px;font-weight:800;color:var(--accent-ink);white-space:nowrap}
  .case p{margin:12px 0 0;font-size:16px;color:var(--text-soft)}

  /* role cards */
  .roles{display:grid;gap:20px;margin:28px 0}
  .role{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);
    box-shadow:var(--shadow);overflow:hidden}
  .role-top{padding:20px 24px;background:var(--surface-2);border-bottom:1px solid var(--border)}
  .role-top h3{margin:0;font-size:20px;scroll-margin-top:0}
  .role-top .tag{font-size:13.5px;color:var(--text-soft);margin-top:4px}
  .role-body{padding:18px 24px 22px}
  .role-body .lbl{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--text-faint);margin:14px 0 6px}
  .role-body .lbl:first-child{margin-top:0}
  .role-body p{margin:8px 0;font-size:15.5px}
  .money{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);
    font-weight:700;padding:2px 10px;border-radius:8px;font-size:14px}

  /* example block (механика «как это ломается») */
  .mech{display:grid;gap:16px;margin:28px 0}
  .mech-item{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);
    box-shadow:var(--shadow);overflow:hidden}
  .mech-top{padding:16px 22px;background:var(--surface-2);border-bottom:1px solid var(--border);
    font-weight:700;font-size:16.5px}
  .mech-top .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);
    padding:2px 9px;border-radius:7px;margin-right:10px;vertical-align:middle}
  .mech-body{padding:16px 22px 20px}
  .mech-body p{margin:8px 0;font-size:15.5px;color:var(--text-soft)}
  .mech-body p:first-child{margin-top:0}
  .mech-body .res{margin-top:12px;font-size:15px;color:var(--text);font-weight:600}
  .mech-body .res::before{content:"→ ";color:#c2694e;font-weight:800}

  /* steps */
  .steps{counter-reset:s;list-style:none;padding:0;margin:28px 0;display:grid;gap:14px}
  .steps li{counter-increment:s;position:relative;padding:18px 20px 18px 64px;
    border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:var(--shadow)}
  .steps li::before{content:counter(s);position:absolute;left:18px;top:16px;
    width:32px;height:32px;border-radius:9px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .steps li b{display:block;margin-bottom:2px}
  .steps li span{color:var(--text-soft);font-size:15.5px}

  /* price table */
  .price{width:100%;border-collapse:collapse;margin:24px 0;font-size:16px;
    border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .price th,.price td{text-align:left;padding:13px 18px;border-bottom:1px solid var(--border);vertical-align:top}
  .price thead th{background:var(--surface-2);font-size:13px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--text-faint)}
  .price tbody tr:last-child td{border-bottom:0}
  .price td.amt{font-weight:750;color:var(--accent-ink);white-space:nowrap}
  .price td.amt small{display:block;font-weight:500;color:var(--text-faint);font-size:12.5px;margin-top:3px}

  /* stat strip */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:28px 0}
  .stat{padding:20px;border:1px solid var(--border);border-radius:12px;background:var(--surface);text-align:center}
  .stat .big{font-size:28px;font-weight:800;color:var(--accent-ink);line-height:1.1}
  .stat .cap{font-size:13.5px;color:var(--text-soft);margin-top:6px}

  /* back to top */
  #totop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;
    border:1px solid var(--border);background:var(--surface);color:var(--accent);
    box-shadow:var(--shadow);cursor:pointer;font-size:20px;opacity:0;pointer-events:none;
    transition:.2s;z-index:40}
  #totop.show{opacity:1;pointer-events:auto}
  #totop:hover{border-color:var(--accent)}

  footer{border-top:1px solid var(--border);margin-top:40px;padding:30px 0 60px;
    color:var(--text-faint);font-size:14.5px}
  footer a{color:var(--text-soft)}

  @media (max-width:920px){
    .wrap{grid-template-columns:1fr;gap:0}
    aside{display:none}
    .toc-mobile{display:block}
    body{font-size:17px}
    main{padding-top:0}
  }
  @media (max-width:560px){
    .stats{grid-template-columns:1fr}
    .topbar-inner{padding:10px 16px}
    .wrap{padding:0 16px}
    .case-head{flex-direction:column;gap:4px}
  }
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>
<div id="progress"></div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="dot"></span><a href="../index.html">yt-videos</a>
      <span class="sep" style="color:var(--border)">/</span>
      <a class="back" href="../index.html">← ко всем конспектам</a>
    </div>
    <button class="theme-toggle" id="theme" aria-label="Переключить тему" title="Светлая / тёмная тема">◐</button>
  </div>
</div>

<div class="wrap">
  <aside>
    <p class="toc-title">Содержание</p>
    <ul class="toc" id="toc">
{{TOC_ITEMS}}
    </ul>
  </aside>

  <main>
  <article>
    <header class="hero">
      <span class="eyebrow">{{EYEBROW}}</span>
      <h1>{{H1}}</h1>
      <p class="lede">{{LEDE}}</p>
      <div class="meta-row">
{{META_ROW}}
      </div>

      <!-- ВИДЕО: по умолчанию всегда вставляется. Если видео не нужно — удалить весь блок .video и .source-row. -->
      <div class="video">
        <iframe src="https://www.youtube.com/embed/{{YOUTUBE_ID}}"
          title="{{H1}} — видео на YouTube" loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
      <div class="source-row">
        <a class="src-btn" href="https://www.youtube.com/watch?v={{YOUTUBE_ID}}" target="_blank" rel="noopener">▶ Смотреть оригинал на YouTube</a>
      </div>

      <details class="toc-mobile">
        <summary>Содержание</summary>
        <ol>
{{TOC_ITEMS}}
        </ol>
      </details>
    </header>

{{ARTICLE_BODY}}

    <hr class="div">
    <footer>
      <p>{{FOOTER}}</p>
      <p><a href="../index.html">← Вернуться ко всем конспектам</a></p>
    </footer>
  </article>
  </main>
</div>

<button id="totop" aria-label="Наверх" title="Наверх">↑</button>

<script>
(function(){
  var root=document.documentElement;
  // theme
  var saved=null;
  try{saved=localStorage.getItem('yt-theme');}catch(e){}
  if(saved){root.setAttribute('data-theme',saved);}
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){
    root.setAttribute('data-theme','dark');
  }
  var btn=document.getElementById('theme');
  btn.addEventListener('click',function(){
    var cur=root.getAttribute('data-theme')==='dark'?'dark':'light';
    var next=cur==='dark'?'light':'dark';
    root.setAttribute('data-theme',next);
    try{localStorage.setItem('yt-theme',next);}catch(e){}
  });

  // progress bar + back to top
  var bar=document.getElementById('progress');
  var top=document.getElementById('totop');
  function onScroll(){
    var h=document.documentElement;
    var max=h.scrollHeight-h.clientHeight;
    var p=max>0?(h.scrollTop/max)*100:0;
    bar.style.width=p+'%';
    if(h.scrollTop>600){top.classList.add('show');}else{top.classList.remove('show');}
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
  top.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

  // scroll-spy
  var links=Array.prototype.slice.call(document.querySelectorAll('.toc a'));
  var map={};
  links.forEach(function(a){map[a.getAttribute('href').slice(1)]=a;});
  var heads=Array.prototype.slice.call(document.querySelectorAll('main h2[id]'));
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(en.isIntersecting){
          links.forEach(function(a){a.classList.remove('active');});
          var a=map[en.target.id];
          if(a)a.classList.add('active');
        }
      });
    },{rootMargin:'-15% 0px -75% 0px',threshold:0});
    heads.forEach(function(h){io.observe(h);});
  }

  // close mobile toc on link click
  var md=document.querySelector('.toc-mobile');
  if(md){md.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){md.removeAttribute('open');});
  });}
})();
</script>
</body>
</html>
